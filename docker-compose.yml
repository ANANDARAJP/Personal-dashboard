version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: personal-tracker-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Add production specific backend env variables here
      - SPRING_PROFILES_ACTIVE=prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Bake this URL into the frontend build.
        # This determines where the browser makes requests.
        - VITE_API_URL=http://localhost:8080/api/v1
    container_name: personal-tracker-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend