server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: personallifetracker
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

jwt:
  secret: YmFzZTY0LWVuY29kZWQtMjU2LWJpdC1zZWNyZXQta2V5LXRoYXQtaXMtcnVnZ2VkLWhhcmRjb2RlZA== # Replace with proper secret for production
  expiration: 86400000 # 24 hours
